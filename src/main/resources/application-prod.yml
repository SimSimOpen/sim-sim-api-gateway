spring:
  cloud:
    gateway:
      httpclient:
        response-timeout: 3600000
        connect-timeout:
          5000:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
      default-filters:
        - PreserveHostHeader
      routes:
        - id: metrics-redirect
          uri: http://localhost:8080
          predicates:
            - Path=/metrics
          filters:
            - RedirectTo=302, /actuator/metrics
        - id: auth
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback
                statusCodes:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
        - id: product
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
          filters:
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback
                statusCodes:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
        - id: media
          uri: lb://media-service
          predicates:
            - Path=/api/media/**
          filters:
            - name: CircuitBreaker
              args:
                name: mediaService
                fallbackUri: forward:/fallback
                statusCodes:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
        - id: event
          uri: lb://notification-service
          predicates:
            - Path=/api/event/**
          metadata:
            response-timeout: 3600000
            connect-timeout: 5000
          filters:
            - RemoveRequestHeader=Accept-Encoding
            - name: CircuitBreaker
              args:
                name: notificationService
                fallbackUri: forward:/fallback
                statusCodes:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
  zipkin:
    enabled: false

management:
  tracing:
    enabled: false



